<div class="die">
	<ol
		class="die-list"
		[class.odd-roll]="rollParity() === 1"
		[class.even-roll]="rollParity() === 2"
		[attr.data-roll]="value()">
		<li class="die-item" data-side="1">
			<span class="dot"></span>
		</li>
		<li class="die-item" data-side="2">
			<span class="dot"></span>
			<span class="dot"></span>
		</li>
		<li class="die-item" data-side="3">
			<span class="dot"></span>
			<span class="dot"></span>
			<span class="dot"></span>
		</li>
		<li class="die-item" data-side="4">
			<span class="dot"></span>
			<span class="dot"></span>
			<span class="dot"></span>
			<span class="dot"></span>
		</li>
		<li class="die-item" data-side="5">
			<span class="dot"></span>
			<span class="dot"></span>
			<span class="dot"></span>
			<span class="dot"></span>
			<span class="dot"></span>
		</li>
		<li class="die-item" data-side="6">
			<span class="dot"></span>
			<span class="dot"></span>
			<span class="dot"></span>
			<span class="dot"></span>
			<span class="dot"></span>
			<span class="dot"></span>
		</li>
	</ol>
</div>
