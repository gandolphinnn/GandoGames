@if (user(); as u) {
	<div class="profile-page">
		<div class="profile-card">
			<div class="profile-header">
				<h1 class="profile-title">Profile</h1>
				@if (u.isGuest) {
					<span class="profile-badge">Guest</span>
				}
			</div>

			<div class="profile-info">
				<div class="info-row">
					<span class="info-label">PlayFab ID</span>
					<span class="info-value">{{ u.id }}</span>
				</div>
				<div class="info-row">
					<span class="info-label">Account type</span>
					<span class="info-value">{{ u.isGuest ? 'Guest' : 'Registered' }}</span>
				</div>
			</div>

			<button class="btn btn-danger" type="button" (click)="logout()">
				Log out
			</button>
		</div>
	</div>
}
